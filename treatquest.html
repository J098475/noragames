//  AUDIO

let AC = null, sfxOn = true;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(f, type, dur, vol, t0, f2) {
  if (!sfxOn) return;
  try {
    const a = ac(), t = a.currentTime + (t0||0);
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type||'square';
    o.frequency.setValueAtTime(f, t);
    if (f2) o.frequency.exponentialRampToValueAtTime(f2, t+dur);
    g.gain.setValueAtTime(vol||0.13, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  } catch(e){}
}
const sfxJump  = () => beep(210,'square',0.13,0.12,0,430);
const sfxLand  = () => beep(110,'square',0.07,0.09);
const sfxStep  = () => beep(80,'square',0.04,0.05);
const sfxHurt  = () => { beep(160,'sawtooth',0.09,0.15,0,70); beep(70,'sawtooth',0.13,0.1,0.09); };
const sfxBoost = () => beep(440,'sawtooth',0.07,0.1,0,700);
const sfxWin   = () => [523,659,784,880,1047,1319].forEach((f,i)=>beep(f,'square',0.13,0.13,i*0.1));
const sfxLife  = () => { beep(784,'square',0.07,0.13,0); beep(1047,'square',0.1,0.15,0.08); beep(1319,'square',0.18,0.17,0.17); };

  beep(784,'triangle',0.10,0.13,0.78);
  beep(1047,'triangle',0.20,0.15,0.88);
}

// ================================================================
//  COLLISION
// ================================================================
function hits(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function solids() {
  return cfg.platforms.filter(p=>!p.nc);
}

// ================================================================
//  UPDATE
// ================================================================
function update() {
  frame++;
  if (gs !== 'playing') return;

  // particles
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; });

  // animation
  P.at++; if (P.at>8){ P.at=0; P.af=(P.af+1)%4; }
  if (P.inv>0) P.inv--;

  if(P.boosted && P.boostTimer>0){ P.boostTimer--; if(P.boostTimer<=0){P.boosted=false;} }

  popups=popups.filter(p=>p.life>0);
  popups.forEach(p=>{p.y-=0.6;p.life--;});

  for(const pu of powerups){
    if(pu.collected) continue;
    if(hits(P.x,P.y,P.w,P.h,pu.x,pu.y,24,24)){
      pu.collected=true;
      if(pu.type==='speed'){
        P.boosted=true; P.boostTimer=180;
        burst(P.x+P.w/2,P.y+P.h/2,'#44aaff',16);
        popups.push({x:pu.x,y:pu.y-10,text:'SPEEDY!',color:'#44aaff',life:80});
        sfxBoost(); score+=50; updateHUD();
      } else {
        lives=Math.min(lives+1,5);
        burst(P.x+P.w/2,P.y+P.h/2,'#ff44aa',16);
        popups.push({x:pu.x,y:pu.y-10,text:'+1 LIFE!',color:'#ff44aa',life:80});
        sfxLife(); score+=100; updateHUD();
      }
    }
  }

  const goL  = keys['ArrowLeft']  || keys['a'];
  const goR  = keys['ArrowRight'] || keys['d'];
  const doJ  = keys['ArrowUp']    || keys['z'] || keys['w'] || keys[' '];
  const doD  = keys['ArrowDown']  || keys['s'];

  // crawl
  if (doD && P.onGround) {
    P.crawling=true; P.h=PH_C;
  } else if (!doD && P.crawling) {
    const ny = P.y-(PH_S-PH_C);
    let blocked = false;
    for (const r of solids()) { if (hits(P.x,ny,P.w,PH_S,r.x,r.y,r.w,r.h)){blocked=true;break;} }
    if (!blocked){ P.crawling=false; P.y=ny; P.h=PH_S; }
  }

  // move
  const spd = P.boosted ? SPD_BOOST : SPD;
  if (goL)      { P.vx=-spd; P.facing=-1; }
  else if (goR) { P.vx= spd; P.facing= 1; }
  else            P.vx=0;

  // footstep
  if (P.onGround && P.vx!==0){ stepT++; if(stepT>=20){stepT=0;sfxStep();} } else stepT=0;

  // jump
  if (doJ && P.onGround){ P.vy=JUMP_V; P.onGround=false; sfxJump(); burst(P.x+P.w/2,P.y+P.h,'#ffffee',5); }

  // gravity
  P.vy+=GRAV; if(P.vy>20)P.vy=20;
  P.wasGround=P.onGround;

  // ── X movement + resolve ──
  P.x+=P.vx;
  P.x=Math.max(0,Math.min(P.x,lvlW-P.w));
  for (const r of solids()){
    if (!hits(P.x,P.y,P.w,P.h,r.x,r.y,r.w,r.h)) continue;
    if (P.vx>0)      P.x=r.x-P.w;
    else if (P.vx<0) P.x=r.x+r.w;
    P.vx=0;
  }

  // ── Y movement + resolve ──
  P.y+=P.vy; P.onGround=false;
  for (const r of solids()){
    if (!hits(P.x,P.y,P.w,P.h,r.x,r.y,r.w,r.h)) continue;
    if (r.type==='lowfurniture'){
      // ceiling slab: push player down, standing cats are blocked by X collision
      P.y=r.y+r.h; if(P.vy<0)P.vy=0; continue;
    }
    if (P.vy>=0 && P.y+P.h-P.vy<=r.y+6){
      P.y=r.y-P.h; P.vy=0; P.onGround=true;
      // Only fire landing effects on the FIRST frame of contact
      if(!P.wasGround){
        sfxLand();
        // Shelf gives a one-time speed boost on landing
        if(r.type==='shelf'){
          P.boosted=true; P.boostTimer=120;
          sfxBoost(); score+=10; updateHUD();
          burst(P.x+P.w/2,P.y+P.h,'#ff8800',10);
        }
      }
      // Leaving a shelf (landing elsewhere) clears shelf-sourced boost
      if(r.type!=='shelf' && P.boostTimer<=120) P.boosted=false;
    } else if (P.vy<0){ P.y=r.y+r.h; P.vy=0; }
  }

  // floor — clear shelf boost, keep fish boost (fish sets boostTimer=180)
  if (P.y+P.h>=GY){ if(!P.wasGround&&P.vy>0)sfxLand(); P.y=GY-P.h; P.vy=0; P.onGround=true; if(P.boostTimer<=120){P.boosted=false;P.boostTimer=0;} }

  // litter hazard
  if (P.inv===0){
    for (const lb of cfg.litterboxes){
      if (hits(P.x+4,P.y+4,P.w-8,P.h-4,lb.x+4,lb.y,lb.w-8,lb.h)){ damage(); break; }
    }
  }

  // treat
  const tr=cfg.treat;
  if (hits(P.x,P.y,P.w,P.h,tr.x,tr.y,28,28)) collect();

  // camera
  const tcx = P.x-W/3+P.facing*60;
  cam.x += (tcx-cam.x)*0.1;
  cam.x = Math.max(0,Math.min(cam.x,lvlW-W));
}

// ================================================================
//  EVENTS
// ================================================================
function damage(){
  lives--; P.inv=130; P.vy=-6; sfxHurt();
  burst(P.x+P.w/2,P.y+P.h/2,'#ff2244',20); updateHUD();
  if(lives<=0){ gs='over'; setTimeout(()=>showOv('GAME OVER',['No treats today, Gus...','Try again?'],'TRY AGAIN',()=>{lives=3;score=0;lvlNum=1;startLevel();}),700); }
}

function collect(){
  if(gs!=='playing') return;
  gs='transitioning'; score+=200+lvlNum*100; updateHUD(); sfxTreat();
  burst(cfg.treat.x+14,cfg.treat.y+14,'#ffcc00',40);
  burst(P.x+P.w/2,P.y+P.h/2,'#ffffee',20);
  if(lvlNum<6){
    setTimeout(()=>showOv('GOOD BOY GUS!',['Treat found! On to the next room!','Score: '+score],'CONTINUE',()=>{lvlNum++;startLevel();}),900);
  } else {
    sfxWin();
    setTimeout(()=>showOv('GUS WINS!',['All treats collected!','Final Score: '+score,'What a good boy!'],'PLAY AGAIN',()=>{lives=3;score=0;lvlNum=1;startLevel();}),900);
  }
}

function burst(x,y,col,n){
  for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-2)*4,color:col,life:25+Math.random()*25,size:3+Math.random()*4});
}

// ================================================================
//  DRAW HELPERS
// ================================================================
function r(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),w,h); }
function sx(wx){ return Math.round(wx-cam.x); }
const BOOKS=['#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00ACC1','#F4511E'];

// ================================================================
//  DRAW BACKGROUND
// ================================================================
function drawBG(){
  // wall
  ctx.fillStyle='#F0DECA'; ctx.fillRect(0,0,W,GY);
  ctx.fillStyle='#E4D2B8';
  const wo=-((cam.x*.25)%48);
  for(let x=wo;x<W;x+=48) ctx.fillRect(x,0,20,GY);
  // baseboard
  ctx.fillStyle='#FFF5EC'; ctx.fillRect(0,GY-10,W,10);
  ctx.fillStyle='#C8B898'; ctx.fillRect(0,GY-10,W,3);
  // floor
  ctx.fillStyle='#C89A55'; ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#B88A45';
  const fo=-((cam.x*.5)%72);
  for(let x=fo;x<W;x+=72) ctx.fillRect(x,GY,36,H-GY);
}

// ================================================================
//  DRAW PLATFORMS
// ================================================================
function drawPlat(pl){
  const x=sx(pl.x), y=pl.y, w=pl.w, h=pl.h;
  switch(pl.type){
    case 'sofa':
      r(x,y+12,w,h-12,'#C05830'); r(x,y,w,16,'#D06A40');
      r(x,y,14,h,'#D06A40'); r(x+w-14,y,14,h,'#D06A40');
      r(x+4,y+h-9,8,9,'#6B3010'); r(x+w-12,y+h-9,8,9,'#6B3010');
      break;
    case 'table':
      r(x,y,w,9,'#B08020'); r(x+1,y+5,w-2,6,'#907010');
      r(x+4,y+9,7,h-9,'#907010'); r(x+w-11,y+9,7,h-9,'#907010');
      break;
    case 'counter':
      r(x,y,w,h,'#D5D5D5'); r(x,y,w,9,'#BDBDBD');
      for(let dx=4;dx<w-8;dx+=38){ r(x+dx,y+14,34,h-18,'#B5B5B5'); r(x+dx+14,y+h/2-3,5,9,'#888'); }
      break;
    case 'shelf':
      r(x,y,w,h,'#D4A060'); r(x,y,w,5,'#B88040');
      for(let bx=3;bx<w-6;bx+=11){ r(x+bx,y-18,9,18,BOOKS[Math.floor((bx/11+(y>>4)))%BOOKS.length]); r(x+bx+1,y-18,7,2,'#ffffff33'); }
      break;
    case 'cattree':
      r(x+w/2-5,y,10,h,'#C89010');
      for(let ry=y;ry<y+h;ry+=8) r(x+w/2-5,ry,10,4,'#A07008');
      break;
    case 'bookshelf':
      r(x,y,w,h,'#6B3020'); r(x+3,y+h/2-2,w-6,4,'#8B4030');
      for(let row=0;row<2;row++){ const ry=y+4+row*(h/2); for(let bx=4;bx<w-5;bx+=10) r(x+bx,ry,8,h/2-6,BOOKS[(bx+row*4)%BOOKS.length]); }
      break;
    case 'lowfurniture':
      // draw full visual body (26px) but only top 10px is collision
      r(x,y,w,10,'#5B7080'); r(x,y,w,6,'#7090A0');
      r(x,y+10,w,16,'#4A6070');
      r(x+5,y+18,10,8,'#405060'); r(x+w-15,y+18,10,8,'#405060');
      break;
    case 'armchair':
      r(x,y+18,w,h-18,'#6040C0'); r(x,y,w,22,'#8060E0');
      r(x,y,15,h,'#8060E0'); r(x+w-15,y,15,h,'#8060E0');
      break;
    case 'scratchpost':
      r(x+w/2-5,y,10,h,'#B87010');
      for(let ry=y;ry<y+h;ry+=7) r(x+w/2-5,ry,10,4,'#906010');
      r(x+w/2-8,y-17,16,17,'#E91E63'); r(x+w/2-4,y-21,8,8,'#FF6090');
      break;
  }
}

// ================================================================
//  DRAW LITTER BOX
// ================================================================
function drawLitter(lb){
  const x=sx(lb.x), y=lb.y, w=lb.w, h=lb.h;
  r(x,y+5,w,h-5,'#A09860'); r(x+4,y+9,w-8,h-11,'#D0C090');
  ctx.strokeStyle='#88cc44'; ctx.lineWidth=2;
  const t=frame*.07;
  for(let i=0;i<3;i++){
    const ox=x+8+i*12, wv=Math.sin(t+i*1.3)*5;
    ctx.beginPath(); ctx.moveTo(ox,y); ctx.quadraticCurveTo(ox+wv,y-10,ox,y-21); ctx.stroke();
  }
  ctx.font='11px serif'; ctx.fillText('\uD83D\uDC80',x+w/2-7,y-23);
}

// ================================================================
//  DRAW TREAT
// ================================================================
function drawTreat(tr){
  const x=sx(tr.x), bob=Math.sin(frame*.08)*5, y=tr.y+bob;
  // Treat glow — layered rects, no shadowBlur to avoid bleed artefacts
  ctx.fillStyle='rgba(255,204,0,0.15)'; ctx.fillRect(x-6,y-6,40,40);
  ctx.fillStyle='rgba(255,204,0,0.10)'; ctx.fillRect(x-10,y-10,48,48);
  r(x+8,y,12,28,'#FFCC00'); r(x,y+8,28,12,'#FFCC00');
  r(x+5,y+5,18,18,'#FFE566'); r(x+10,y+10,8,8,'#FFF0AA');
  ctx.fillStyle='#fff'; ctx.font='9px serif';
  ['\u2726','\u2B51','\u2726'].forEach((s,i)=>{ const a=frame*.06+i*2.09; ctx.fillText(s,x+14+Math.cos(a)*20,y+14+Math.sin(a)*11); });
}

// ================================================================
//  DRAW BOOST GLOW  (drawn BEHIND Gus so it never makes a square on top)
// ================================================================
function drawBoostGlow(){
  if(!P.boosted) return;
  const x=Math.round(P.x-cam.x), y=Math.round(P.y);
  const w=P.w, h=P.h;
  // Draw several expanding semi-transparent orange rectangles to fake a glow
  // No shadowBlur — that's what caused the square artefact
  const colours=['rgba(255,136,0,0.18)','rgba(255,136,0,0.12)','rgba(255,136,0,0.07)'];
  colours.forEach((c,i)=>{
    const pad=(i+1)*4;
    ctx.fillStyle=c;
    ctx.fillRect(x-pad, y-pad, w+pad*2, h+pad*2);
  });
  // Crisp orange border — no shadow, no blur
  ctx.strokeStyle='rgba(255,136,0,0.8)';
  ctx.lineWidth=2;
  ctx.strokeRect(x-2, y-2, w+4, h+4);
}

// ================================================================
//  DRAW GUS — White Persian Cat
//  Persian traits: very fluffy/round body, flat squished face,
//  small round ears set wide/low, huge fluffy tail, long fur texture
// ================================================================
function drawGus(){
  const x=sx(P.x), y=Math.round(P.y), f=P.facing;
  const blink=frame%70<4;
  const flash=P.inv>0&&frame%8<4;
  if(flash) ctx.globalAlpha=0.35;

  // Persian colour palette
  const W1='#FFFFFF';  // bright white main fur
  const W2='#F0EEEE';  // slightly off-white shadow/underside
  const W3='#E8E4E4';  // deeper shadow for fur depth
  const PNK='#FFB6C1'; // pink nose, inner ears, paw pads
  const EYE='#4FC3F7'; // bright blue eyes (classic Persian)
  const EPUP='#1a1a1a';// pupil
  const ORG='#E0A060'; // orange/amber eye accent (Persian eyes)

  if(P.crawling){
    // ── CRAWL: flat fluffy sausage ──────────────────────────────
    // main body — extra wide/round for Persian fluff
    r(x,   y+6,  P.w,   12, W1);
    r(x+2, y+5,  P.w-4, 14, W1);
    // belly fluff (slightly off white)
    r(x+4, y+9,  P.w-8, 7,  W2);
    // fur texture streaks
    r(x+2, y+6,  3, 8, W2); r(x+9, y+6,3,8,W2); r(x+17,y+6,3,8,W2);
    // fluffy tail — Persian tails are enormous, like a feather duster
    if(f>0){
      r(x-4,y+2,8,14,W1); r(x-6,y+1,6,4,W1); r(x-6,y+11,6,4,W1);
      r(x-8,y+4,4,8,W2);
    } else {
      r(x+P.w-4,y+2,8,14,W1); r(x+P.w,y+1,6,4,W1); r(x+P.w,y+11,6,4,W1);
      r(x+P.w+4,y+4,4,8,W2);
    }
    // legs (stubby — Persians have short legs)
    r(x+3,  y+17, 6,4, W1); r(x+P.w-9,y+17,6,4,W1);
    r(x+3,  y+19, 6,2, PNK); r(x+P.w-9,y+19,6,2,PNK);

    // HEAD — Persian flat face, round skull
    const hx=f>0?x+P.w-16:x+2;
    // skull — very round
    r(hx,   y,    16,14,W1);
    r(hx-1, y+2,  18,10,W1); // wider
    r(hx+1, y+1,  14,12,W2); // face depth
    // super flat muzzle (Persian defining feature — pushed-in face)
    r(f>0?hx+9:hx+1, y+6, 7,6, W2);
    // tiny round ears (Persians have small ears set far apart, tilted outward)
    if(f>0){ r(hx+1,y-4,5,5,W1); r(hx+2,y-3,3,3,PNK); r(hx+9,y-3,4,4,W1); r(hx+10,y-2,2,2,PNK); }
    else   { r(hx+10,y-4,5,5,W1);r(hx+11,y-3,3,3,PNK);r(hx,y-3,4,4,W1);  r(hx+1,y-2,2,2,PNK); }
    // big round eyes (Persians have large prominent eyes)
    const ex=f>0?hx+9:hx+2;
    if(!blink){ r(ex,y+3,5,5,EYE); r(ex+1,y+4,2,2,EPUP); r(ex,y+3,2,2,'#aae8ff'); }
    else r(ex,y+6,5,2,EYE);
    // tiny flat nose
    r(f>0?hx+11:hx+2, y+8, 3,2, PNK);

  } else {
    // ── STAND/WALK: round fluffy Persian ───────────────────────
    // main body — rounder and fluffier than regular cat
    r(x+3, y+8,  22, 16, W1);  // core
    r(x+1, y+10, 26, 12, W1);  // wider middle = fluffier
    r(x+5, y+11, 18, 11, W2);  // belly

    // fur texture — Persian long fur streaks
    r(x+4, y+8,  2,12,W2); r(x+9, y+8,2,12,W2); r(x+14,y+8,2,12,W2); r(x+20,y+8,2,12,W2);

    // leg/paw (short stubby Persian legs, animated)
    const lo=P.onGround?[0,2,4,2][P.af]:0;
    r(x+5,  y+23, 8, 4+lo, W1); r(x+5,  y+26+lo, 8,2,PNK);
    r(x+16, y+23, 8, 4-lo, W1); r(x+16, y+26-lo, 8,2,PNK);

    // FLUFFY TAIL — Persian tails are huge feather-duster plumes
    const tw=Math.sin(frame*.1)*5;
    if(f>0){
      // tail base and thick plume to the left
      r(x-2,  y+10+tw, 6,  14, W1);
      r(x-5,  y+8+tw,  6,  6,  W1);
      r(x-5,  y+17+tw, 6,  6,  W1);
      r(x-8,  y+10+tw, 5,  10, W2); // plume tip
    } else {
      r(x+P.w-4, y+10+tw, 6,  14, W1);
      r(x+P.w-1, y+8+tw,  6,  6,  W1);
      r(x+P.w-1, y+17+tw, 6,  6,  W1);
      r(x+P.w+3, y+10+tw, 5,  10, W2);
    }

    // NECK RUFF — Persians have a massive mane/ruff
    r(x+4,  y+4,  20, 8, W1);
    r(x+2,  y+5,  24, 6, W1);  // extra wide ruff
    r(x+3,  y+4,  3,  7, W2);  r(x+10,y+4,3,7,W2); r(x+18,y+4,3,7,W2);

    // HEAD — very round skull, Persian are famous for their round heads
    const hx=f>0?x+7:x+1;
    r(hx,   y-4,  20,18, W1); // main skull
    r(hx-2, y-2,  24,14, W1); // even wider
    r(hx+1, y-3,  18,16, W2); // face shading

    // cheek puffs (Persians are very cheeky/fluffy-faced)
    r(f>0?hx-2:hx+20, y+2, 6,8, W1);

    // small round ears set low and wide on the head
    if(f>0){
      r(x+9, y-9, 6,7, W1); r(x+10,y-8,4,5,PNK);
      r(x+19,y-7, 6,6, W1); r(x+20,y-6,4,4,PNK);
    } else {
      r(x+5, y-9, 6,7, W1); r(x+6, y-8,4,5,PNK);
      r(x+15,y-7, 6,6, W1); r(x+16,y-6,4,4,PNK);
    }

    // FLAT FACE — Persian defining feature
    // pushed-in muzzle area
    const mx=f>0?hx+12:hx+1;
    r(mx, y+2, 8,10, W2);  // muzzle flat zone
    r(mx+1,y+3,6,8,  W3);

    // LARGE ROUND EYES (Persian eyes are huge and expressive)
    const ex=f>0?hx+14:hx+2;
    if(!blink){
      r(ex,   y-1, 6,7, EYE);   // iris
      r(ex+1, y,   3,4, EPUP);  // pupil
      r(ex,   y-1, 3,2, '#ccf4ff'); // highlight
    } else {
      r(ex, y+4, 6,2, EYE);
    }

    // tiny flat nose (Persian noses are very small and close to eyes)
    r(f>0?hx+15:hx+3, y+5, 4,3, PNK);
    // subtle mouth line
    ctx.strokeStyle=W3; ctx.lineWidth=1;
    const mnx=f>0?hx+16:hx+4;
    ctx.beginPath(); ctx.moveTo(mnx,y+8); ctx.lineTo(mnx,y+10); ctx.stroke();

    // WHISKERS — Persians have abundant long whiskers
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
    const wnx=f>0?hx+19:hx+7;
    for(let i=-1;i<=1;i++){
      ctx.beginPath(); ctx.moveTo(wnx,y+5+i*2);
      ctx.lineTo(wnx+f*15,y+4+i*2); ctx.stroke();
    }
    // extra short whiskers pointing slightly upward
    ctx.beginPath(); ctx.moveTo(wnx,y+4);
    ctx.lineTo(wnx+f*10,y+1); ctx.stroke();
  }

  ctx.globalAlpha=1;
}

// ================================================================
//  DRAW POWER-UPS
// ================================================================
function drawPowerups(){
  for(const pu of powerups){
    if(pu.collected) continue;
    const px2=Math.round(pu.x-cam.x), py2=pu.y;
    const bob=Math.sin(frame*0.09)*3;
    if(pu.type==='speed'){
      ctx.save();
      r(px2+2,py2+6+bob,18,10,'#5BB8FF');
      r(px2+4,py2+4+bob,14,14,'#3A9FE8');
      r(px2+6,py2+6+bob,10,10,'#88CCFF');
      r(px2,  py2+5+bob, 6, 4,'#3A9FE8');
      r(px2,  py2+13+bob,6, 4,'#3A9FE8');
      r(px2+17,py2+8+bob,3,3,'#fff');
      r(px2+18,py2+9+bob,2,2,'#111');
      ctx.restore();
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px2-2,py2-15+bob,42,12);
      ctx.fillStyle='#44aaff'; ctx.font='bold 7px monospace';
      ctx.fillText('SPEEDY!',px2,py2-5+bob);
    } else {
      ctx.save();
      r(px2+2,py2+2+bob,20,20,'#FF6EC7');
      r(px2+4,py2+4+bob,16,16,'#FF44AA');
      r(px2+7,py2+7+bob,10,10,'#FF99DD');
      ctx.strokeStyle='#FF99DD'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(px2+3,py2+6+bob); ctx.lineTo(px2+20,py2+18+bob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px2+20,py2+6+bob); ctx.lineTo(px2+3,py2+18+bob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px2+12,py2+2+bob); ctx.lineTo(px2+12,py2+22+bob); ctx.stroke();
      ctx.strokeStyle='#FF44AA'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(px2+22,py2+8+bob); ctx.lineTo(px2+28,py2+4+bob); ctx.stroke();
      ctx.restore();
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px2-2,py2-15+bob,44,12);
      ctx.fillStyle='#ff44aa'; ctx.font='bold 7px monospace';
      ctx.fillText('+1 LIFE!',px2,py2-5+bob);
    }
  }
}

// ================================================================
//  DRAW FLOATING POPUPS
// ================================================================
function drawPopups(){
  for(const p of popups){
    ctx.globalAlpha=Math.min(1,p.life/30);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(Math.round(p.x-cam.x)-2,Math.round(p.y)-10,p.text.length*8+4,14);
    ctx.fillStyle=p.color; ctx.font='bold 9px monospace';
    ctx.fillText(p.text,Math.round(p.x-cam.x),Math.round(p.y));
    ctx.globalAlpha=1;
  }
}

// ================================================================
//  DRAW PARTICLES
// ================================================================
function drawParts(){
  parts.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/50);
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.round(p.x-cam.x-p.size/2),Math.round(p.y-p.size/2),p.size,p.size);
  });
  ctx.globalAlpha=1;
}

// ================================================================
//  DRAW HINTS & ARROW
// ================================================================
function drawHints(){
  cfg.platforms.forEach(pl=>{
    const sx2=pl.x-cam.x;
    if(sx2<-150||sx2>W+50) return;
    if(pl.type==='lowfurniture'){
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(sx(pl.x)+pl.w/2-26,pl.y-21,52,14);
      ctx.fillStyle='#FFE44A'; ctx.font='bold 7px monospace';
      ctx.fillText('\u2193 CRAWL',sx(pl.x)+pl.w/2-22,pl.y-9);
    }
    if(pl.type==='shelf'){
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(sx(pl.x)+pl.w/2-18,pl.y-21,38,14);
      ctx.fillStyle='#ff8800'; ctx.font='bold 6px monospace';
      ctx.fillText('BOOST!',sx(pl.x)+pl.w/2-14,pl.y-9);
    }
  });
}
function drawArrow(){
  const tx=cfg.treat.x+14-cam.x;
  if(tx>10&&tx<W-10) return;
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(W/2-44,8,90,18);
  ctx.fillStyle='#FFE44A'; ctx.font='bold 11px monospace';
  ctx.fillText((tx>W/2?'\u25BA':'\u25C4')+' TREAT',W/2-36,22);
}

// ================================================================
//  MAIN DRAW
// ================================================================
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  // HUD — dark strip for readability
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,24);
  ctx.fillStyle='#FFE44A';
  ctx.font='bold 11px monospace';
  ctx.fillText('LIVES: '+'\u2665'.repeat(Math.max(0,lives)), 8, 16);
  ctx.fillText('SCORE: '+score, W/2-48, 16);
  ctx.fillText('LEVEL: '+lvlNum, W-88, 16);
  if(P.boosted){
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,24,W,4);
    ctx.fillStyle='#ff8800'; ctx.fillRect(0,24,W*(P.boostTimer/180),4);
  }
  cfg.platforms.forEach(pl=>{ if(pl.x-cam.x<W+200&&pl.x+pl.w-cam.x>-200) drawPlat(pl); });
  cfg.litterboxes.forEach(lb=>{ if(lb.x-cam.x<W+80&&lb.x+lb.w-cam.x>-80) drawLitter(lb); });
  const tr=cfg.treat;
  if(tr.x-cam.x>-40&&tr.x-cam.x<W+40) drawTreat(tr);
  drawPowerups();
  drawParts();
  drawBoostGlow();
  drawGus();
  drawHints();
  drawArrow();
  drawPopups();
}

// ================================================================
//  UI
// ================================================================
function updateHUD(){ /* HUD is drawn on canvas in draw() */ }

function showOv(title,lines,btn,cb){
  gs='paused';
  const ov=document.getElementById('overlay');
  const ic=title.includes('WIN')||title.includes('BOY')?'&#128513;':title.includes('OVER')?'&#128543;':'&#128049;';
  ov.innerHTML=`<div class="big">${ic} ${title} ${ic}</div><div class="med">${lines.join('<br>')}</div><button onclick="ovCb()">${btn}</button>`;
  ov.style.display='flex';
  window._ovCb=cb;
}
function ovCb(){
  document.getElementById('overlay').style.display='none';
  if(AC&&AC.state==='suspended') AC.resume();
  window._ovCb();
}

function startLevel(){
  cfg=LEVELS[lvlNum-1]; lvlW=cfg.width; parts=[];
  powerups=POWERUP_DEFS[lvlNum-1].map(def=>Object.assign({},def,{collected:false}));
  popups=[];
  resetP(cfg.playerStart.x,cfg.playerStart.y);
  gs='playing'; updateHUD();
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  if(!AC){ AC=new(window.AudioContext||window.webkitAudioContext)(); }
  if(AC.state==='suspended') AC.resume();
  lives=3; score=0; lvlNum=1; startLevel();
}

// ================================================================
//  INPUT
// ================================================================
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Mobile controls
(function(){
  const mc=document.createElement('div');
  // Two-thumb layout: d-pad left, action buttons right
  mc.style.cssText=[
    'display:flex',
    'justify-content:space-between',
    'align-items:flex-end',
    'margin-top:10px',
    'width:648px',   // matches canvas+border width
    'padding:0 8px',
    'box-sizing:border-box',
  ].join(';');

  mc.innerHTML=`
  <style>
    /* Shared button base */
    .mb {
      width:60px; height:60px;
      border:none; border-radius:8px;
      cursor:pointer;
      box-shadow:3px 3px #ff4400;
      color:#1a0a2e;
      touch-action:manipulation;
      /* Prevent text/emoji selection on long-press */
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      /* Use canvas-drawn arrows instead of text so there's nothing to select */
      font-size:0;           /* hide any fallback text */
      background-repeat:no-repeat;
      background-position:center;
      background-size:28px 28px;
    }
    .mb:active { transform:translate(2px,2px); box-shadow:1px 1px #ff4400; }

    /* Left cluster: ◀ and ▶ side by side */
    #dpad { display:flex; gap:8px; }

    /* Right cluster: ▲ on top, ▼ below */
    #apad { display:flex; flex-direction:column; gap:8px; }
  </style>

  <!-- LEFT: movement -->
  <div id="dpad">
    <button class="mb" id="mb-l" style="background:#ffcc00;"
      aria-label="Left"></button>
    <button class="mb" id="mb-r" style="background:#ffcc00;"
      aria-label="Right"></button>
  </div>

  <!-- RIGHT: jump / duck -->
  <div id="apad">
    <button class="mb" id="mb-j" style="background:#ff9900;"
      aria-label="Jump"></button>
    <button class="mb" id="mb-d" style="background:#ffaa00;"
      aria-label="Duck"></button>
  </div>`;

  document.getElementById('wrap').appendChild(mc);
  if(!('ontouchstart' in window)) mc.style.display='none';

  // Draw arrows onto buttons via canvas so there is zero selectable text
  const arrows = {
    'mb-l': (ctx,w,h)=>{ ctx.beginPath(); ctx.moveTo(w*.65,h*.2); ctx.lineTo(w*.25,h*.5); ctx.lineTo(w*.65,h*.8); ctx.fill(); },
    'mb-r': (ctx,w,h)=>{ ctx.beginPath(); ctx.moveTo(w*.35,h*.2); ctx.lineTo(w*.75,h*.5); ctx.lineTo(w*.35,h*.8); ctx.fill(); },
    'mb-j': (ctx,w,h)=>{ ctx.beginPath(); ctx.moveTo(w*.5,h*.2); ctx.lineTo(w*.8,h*.75); ctx.lineTo(w*.2,h*.75); ctx.fill(); },
    'mb-d': (ctx,w,h)=>{ ctx.beginPath(); ctx.moveTo(w*.5,h*.8); ctx.lineTo(w*.8,h*.25); ctx.lineTo(w*.2,h*.25); ctx.fill(); },
  };
  Object.keys(arrows).forEach(id=>{
    const btn=document.getElementById(id);
    const cv=document.createElement('canvas');
    const dpr=window.devicePixelRatio||1;
    cv.width=60*dpr; cv.height=60*dpr;
    cv.style.cssText='position:absolute;top:0;left:0;width:60px;height:60px;pointer-events:none;';
    btn.style.position='relative';
    const cx=cv.getContext('2d');
    cx.scale(dpr,dpr);
    cx.fillStyle='rgba(0,0,0,0.5)';
    arrows[id](cx,60,60);
    btn.appendChild(cv);
  });

  const map={'mb-l':'ArrowLeft','mb-r':'ArrowRight','mb-d':'ArrowDown','mb-j':'ArrowUp'};
  Object.keys(map).forEach(id=>{
    const el=document.getElementById(id),k=map[id];
    el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
    el.addEventListener('touchend',  e=>{e.preventDefault();keys[k]=false;},{passive:false});
    el.addEventListener('touchcancel',()=>keys[k]=false);
    el.addEventListener('mousedown', e=>{e.preventDefault();keys[k]=true;});
    el.addEventListener('mouseup',   ()=>keys[k]=false);
    el.addEventListener('mouseleave',()=>keys[k]=false);
  });
})();

// ================================================================
//  LOOP
// ================================================================
cfg=LEVELS[0]; lvlW=cfg.width; resetP(cfg.playerStart.x,cfg.playerStart.y);
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

<script>
// Scale the game to fit the viewport so HUD is never clipped
function scaleWrap() {
  const wrap = document.getElementById('wrap');
  const availH = window.innerHeight - 24;
  const availW = window.innerWidth  - 16;
  // Natural height: hud (~20) + canvas (368 inc border) + info (~24) + sfxbtn (~30) = ~442
  const naturalH = 442;
  const naturalW = 648; // 640 + borders
  const scale = Math.min(1, availW / naturalW, availH / naturalH);
  wrap.style.transform = `scale(${scale})`;
}
scaleWrap();
window.addEventListener('resize', scaleWrap);
</script>
