// ── Audio ────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol, when) {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    const t = a.currentTime + (when || 0);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function sndJump()    { beep(300,'square',0.12,0.15); beep(450,'square',0.08,0.12,0.06); }
function sndCollect() { beep(523,'square',0.07,0.15); beep(659,'square',0.07,0.12,0.07); beep(784,'square',0.1,0.12,0.14); }
function sndHurt()    { beep(200,'sawtooth',0.08,0.2); beep(150,'sawtooth',0.12,0.18,0.07); }
function sndBone()    { beep(440,'triangle',0.06,0.2); beep(554,'triangle',0.06,0.18,0.07); beep(659,'triangle',0.08,0.18,0.14); beep(880,'triangle',0.1,0.2,0.22); }
function sndWin() {

}

});

// ── Draw pixel art sprites ─────────────────────────────────────
// Each sprite is drawn with 4x4 "pixels"
const PX = 4;

function drawPixelSprite(sprite, sx, sy, flipX) {
  sprite.forEach(([col, px, py, pw, ph]) => {
    ctx.fillStyle = col;
    const dx = flipX ? (sprite._w - px - pw) : px;
    ctx.fillRect(sx + dx * PX, sy + py * PX, pw * PX, ph * PX);
  });
}

// Pip: 8x10 pixel grid
// Format: [color, px, py, pw, ph]
const PIP_W = 8, PIP_H = 10;
const PIP_SPRITE = [
  // Body (white)
  ['#f0f0f0', 1,4, 6,5],
  // Head (white)
  ['#f0f0f0', 1,1, 6,4],
  // Brown spots
  ['#8b4513', 2,5, 2,2],
  ['#8b4513', 5,5, 2,2],
  ['#8b4513', 4,2, 2,2],
  // Eyes
  ['#111',    5,2, 1,1],
  // Nose
  ['#ff88aa', 5,4, 1,1],
  // Ear left
  ['#d4a870', 1,1, 2,2],
  // Ear right
  ['#d4a870', 6,1, 2,1],
  // Tail
  ['#f0f0f0', 0,5, 1,3],
  // Legs (drawn dynamically)
];
PIP_SPRITE._w = PIP_W;

function drawPip(x, y, facingRight, frame, inv) {
  // Flicker when invincible
  if (inv > 0 && Math.floor(Date.now() / 80) % 2 === 0) return;

  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const flip = !facingRight;
  const bob = (frame % 2) * 1; // slight bob when walking

  ctx.save();
  ctx.translate(sx, sy + bob);

  // Body
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(PX, PX*4, PX*6, PX*5);
  // Head
  ctx.fillRect(PX, PX*1, PX*6, PX*4);
  // Brown spots
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(flip ? PX*4 : PX*2, PX*5, PX*2, PX*2);
  ctx.fillRect(flip ? PX*1 : PX*5, PX*2, PX*2, PX*2);
  // Outline / shadow
  ctx.fillStyle = '#c8c8c8';
  ctx.fillRect(PX, PX*8, PX*6, PX*1);
  // Eye
  ctx.fillStyle = '#111';
  ctx.fillRect(flip ? PX*2 : PX*5, PX*2, PX*1, PX*1);
  // Nose
  ctx.fillStyle = '#ff88aa';
  ctx.fillRect(flip ? PX*1 : PX*6, PX*4, PX*1, PX*1);
  // Ear
  ctx.fillStyle = '#d4a870';
  ctx.fillRect(flip ? PX*5 : PX*1, PX*0, PX*2, PX*2);
  ctx.fillRect(flip ? PX*2 : PX*5, PX*0, PX*1, PX*1);
  // Tail
  ctx.fillStyle = '#e8e8e8';
  const tailX = flip ? PX*7 : 0;
  const tailWag = Math.sin(Date.now() / 200) * 2;
  ctx.fillRect(tailX, PX*4 + tailWag, PX*1, PX*4);
  // Legs
  ctx.fillStyle = '#e0e0e0';
  const legOff = (frame % 2) === 0 ? 0 : PX;
  ctx.fillRect(PX*2, PX*9 - legOff,    PX*2, PX*2);
  ctx.fillRect(PX*5, PX*9 + legOff,    PX*2, PX*2);

  ctx.restore();
}

// Cat: 7x8 grid
function drawCat(x, y, facingRight, frame) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const flip = !facingRight;
  const bob = (frame % 2) * 1;

  ctx.save();
  ctx.translate(sx, sy + bob);

  // Body
  ctx.fillStyle = '#d4612a';
  ctx.fillRect(PX*1, PX*3, PX*5, PX*4);
  // Head
  ctx.fillRect(PX*1, PX*1, PX*5, PX*3);
  // Stripes
  ctx.fillStyle = '#a03010';
  ctx.fillRect(PX*2, PX*4, PX*1, PX*3);
  ctx.fillRect(PX*4, PX*4, PX*1, PX*3);
  // Ears (pointy)
  ctx.fillStyle = '#d4612a';
  ctx.fillRect(flip ? PX*4 : PX*1, 0, PX*1, PX*2);
  ctx.fillRect(flip ? PX*2 : PX*4, 0, PX*1, PX*1);
  // Eyes (menacing green)
  ctx.fillStyle = '#00dd44';
  ctx.fillRect(flip ? PX*2 : PX*4, PX*2, PX*1, PX*1);
  // Tail
  ctx.fillStyle = '#c05020';
  const tailSway = Math.sin(Date.now() / 300 + x * 0.01) * 3;
  ctx.fillRect(flip ? PX*6 : 0, PX*5 + tailSway, PX*1, PX*3);
  // Legs
  ctx.fillStyle = '#b04010';
  const lf = frame % 2;
  ctx.fillRect(PX*1, PX*7 - lf*PX, PX*2, PX*2);
  ctx.fillRect(PX*4, PX*7 + lf*PX, PX*2, PX*2);

  ctx.restore();
}

// Washing machine
function drawWasher(x, y) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const pw = 14, ph = 16; // in PX units

  // Body
  ctx.fillStyle = '#dde';
  ctx.fillRect(sx, sy, pw*PX, ph*PX);
  // Control panel top
  ctx.fillStyle = '#bbc';
  ctx.fillRect(sx, sy, pw*PX, PX*2);
  // Door circle
  ctx.fillStyle = '#5af';
  ctx.beginPath();
  ctx.arc(sx + pw*PX/2, sy + ph*PX*0.6, PX*4, 0, Math.PI*2);
  ctx.fill();
  // Door rim
  ctx.strokeStyle = '#88a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(sx + pw*PX/2, sy + ph*PX*0.6, PX*4, 0, Math.PI*2);
  ctx.stroke();
  // Spin animation
  const ang = Date.now() / 400;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx + pw*PX/2 + Math.cos(ang)*PX*2.5, sy + ph*PX*0.6 + Math.sin(ang)*PX*2.5);
  ctx.lineTo(sx + pw*PX/2 - Math.cos(ang)*PX*2.5, sy + ph*PX*0.6 - Math.sin(ang)*PX*2.5);
  ctx.stroke();
  // Knobs
  ctx.fillStyle = '#88a';
  ctx.fillRect(sx + PX, sy + PX/2, PX*2, PX);
  ctx.fillRect(sx + PX*4, sy + PX/2, PX*2, PX);
  // Glow
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = '#44ffaa';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx-2, sy-2, pw*PX+4, ph*PX+4);
  ctx.shadowBlur = 0;
  // Label
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', sx + pw*PX/2, sy + ph*PX + 14);
  ctx.textAlign = 'left';
}
const WASHER_W = 14*PX, WASHER_H = 16*PX;

// Laundry item
function drawLaundry(x, y, color) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const bob = Math.sin(Date.now() / 500 + x * 0.05) * 3;
  // Shirt shape
  ctx.fillStyle = color;
  ctx.fillRect(sx,      sy + bob + 6,  20, 14);
  ctx.fillRect(sx + 3,  sy + bob,       14, 8);
  ctx.fillRect(sx - 4,  sy + bob + 2,   8,  8);
  ctx.fillRect(sx + 16, sy + bob + 2,   8,  8);
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(sx + 4, sy + bob + 2, 4, 2);
}
const LAUNDRY_W = 20, LAUNDRY_H = 20;

// Bone power-up
function drawBone(x, y, kind) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const bob = Math.sin(Date.now() / 400 + x * 0.05) * 3;
  const col = kind === 'life' ? '#ff88aa' : '#88ccff';
  ctx.fillStyle = col;
  // Shaft
  ctx.fillRect(sx + 4, sy + bob + 8, 16, 6);
  // Knobs
  ctx.beginPath(); ctx.arc(sx + 5,  sy + bob + 11, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx + 19, sy + bob + 11, 5, 0, Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle = kind === 'life' ? '#ff3366' : '#3399ff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(kind === 'life' ? '+♥' : '⚡', sx + 12, sy + bob + 2);
  ctx.textAlign = 'left';
}
const BONE_W = 24, BONE_H = 22;

// ── Player object ────────────────────────────────────────────
const GRAV  = 0.5;
const JUMP  = -11;
const SPD   = 3.5;

const player = {
  x: 40, y: 200,
  vx: 0, vy: 0,
  w: PIP_W * PX,
  h: PIP_H * PX,
  onGround: false,
  facingRight: true,
  frame: 0,
  frameTimer: 0,
  invTimer: 0,   // frames of invincibility after hit
  speedBoost: 0, // frames of speed boost remaining
  jumpHeld: false,
};

function playerRect() { return { x:player.x, y:player.y, w:player.w, h:player.h }; }

// ── Level runtime state ──────────────────────────────────────
let cats     = [];
let laundry  = [];
let bones    = [];
let platforms = [];
let washer   = { x:0, y:0 };
let levelDef = null;
let collectedCount = 0;
let speedBoostTimer = 0;

function initLevel(def) {
  levelDef  = def;
  platforms = def.platforms;
  washer    = def.washer;

  // Deep copy cats with runtime fields
  cats = def.cats.map(c => ({
    x: c.x, y: c.y,
    px: c.px, pw: c.pw,   // patrol: start x, width
    speed: c.speed,
    dir: c.dir,
    frame: 0, frameTimer: 0,
  }));

  // Deep copy laundry
  laundry = def.laundry.map(l => ({ x:l.x, y:l.y, color: LAUNDRY_COLORS[Math.floor(Math.random()*LAUNDRY_COLORS.length)], picked: false }));

  // Deep copy bones
  bones = def.bones.map(b => ({ x:b.x, y:b.y, kind:b.kind, picked: false }));

  // Place player
  player.x = def.start.x;
  player.y = def.start.y;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.facingRight = true;
  player.frame = 0;
  player.invTimer = 90; // grace period at start
  player.speedBoost = 0;
  player.jumpHeld = false;

  collectedCount  = 0;
  speedBoostTimer = 0;
  cam.x = 0;
  particles = [];
}

const LAUNDRY_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

// ── Collision helpers ────────────────────────────────────────
function platformsUnder(r) {
  // Returns the highest platform that the rect is standing on
  for (const p of platforms) {
    const pr = { x:p.x, y:p.y, w:p.w, h:p.h };
    if (overlaps(r, pr)) return p;
  }
  return null;
}

function resolvePlayer() {
  // Move X
  player.x += player.vx;
  player.x = clamp(player.x, 0, levelDef.levelW - player.w);

  // X collision with platforms
  for (const p of platforms) {
    const pr = rect(player.x, player.y + 4, player.w, player.h - 4);
    const pp = rect(p.x, p.y, p.w, p.h);
    if (overlaps(pr, pp)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;

  // Y collision with platforms
  player.onGround = false;
  for (const p of platforms) {
    const pr = rect(player.x + 2, player.y, player.w - 4, player.h);
    const pp = rect(p.x, p.y, p.w, p.h);
    if (overlaps(pr, pp)) {
      if (player.vy >= 0) {
        // Landing on top
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else {
        // Hitting ceiling
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }
}

// ── Particle system ─────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: rnd(-3, 3), vy: rnd(-5, -1),
      life: 1, color,
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.15;
    p.life -= 0.03;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(camX(p.x) - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
}

// ── HUD ─────────────────────────────────────────────────────
function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 36);

  // Lives
  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('❤', 10, 22);
  ctx.fillStyle = '#fff';
  ctx.fillText('x ' + lives, 28, 22);

  // Level name
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(levelDef ? levelDef.name : '', W/2, 22);
  ctx.textAlign = 'left';

  // Laundry count
  ctx.fillStyle = '#aef';
  ctx.font = 'bold 14px monospace';
  const ltxt = `🧺 ${collectedCount} / ${laundry.length}`;
  ctx.fillText(ltxt, W - 130, 22);

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = '12px monospace';
  ctx.fillText(`Score: ${score}`, W - 130, 36 + 14);

  // Speed boost indicator
  if (speedBoostTimer > 0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('⚡ SPEED!', 10, 50);
  }
}

// ── Background ───────────────────────────────────────────────
function drawBackground(def) {
  // Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, def.bg[0]);
  grad.addColorStop(1, def.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Simple wallpaper dots
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x < W; x += 40) {
    for (let y = 36; y < H; y += 40) {
      ctx.fillRect(x + 2, y + 2, 4, 4);
    }
  }
}

// ── Draw platforms ───────────────────────────────────────────
function drawPlatforms() {
  for (const p of platforms) {
    const sx = camX(p.x);
    if (sx + p.w < 0 || sx > W) continue;
    ctx.fillStyle = p.color;
    ctx.fillRect(sx, p.y, p.w, p.h);
    // Highlight top edge
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(sx, p.y, p.w, 3);
    // Shadow bottom edge
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(sx, p.y + p.h - 3, p.w, 3);
  }
}

// ── Overlay helpers ──────────────────────────────────────────
function drawOverlay(title, lines, btnText) {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 48px monospace';
  ctx.shadowColor = '#ffa500';
  ctx.shadowBlur = 16;
  ctx.fillText(title, W/2, H/2 - 80);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ddd';
  ctx.font = '18px monospace';
  lines.forEach((l, i) => ctx.fillText(l, W/2, H/2 - 20 + i*30));

  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 20px monospace';
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) ctx.fillText(btnText, W/2, H/2 + lines.length*30 + 20);

  ctx.textAlign = 'left';
}

// ── Main update ──────────────────────────────────────────────
function update() {
  if (screen !== 'playing') return;

  // ── Player movement ──
  const spd = (speedBoostTimer > 0) ? SPD * 1.7 : SPD;

  if (KEY['ArrowLeft']) {
    player.vx = -spd;
    player.facingRight = false;
  } else if (KEY['ArrowRight']) {
    player.vx = spd;
    player.facingRight = true;
  } else {
    player.vx = 0;
  }

  // Jump
  const jumpKey = KEY['ArrowUp'] || KEY['Space'];
  if (jumpKey && player.onGround && !player.jumpHeld) {
    player.vy = JUMP;
    player.jumpHeld = true;
    player.onGround = false;
    sndJump();
  }
  if (!jumpKey) player.jumpHeld = false;

  // Gravity
  player.vy += GRAV;
  player.vy = Math.min(player.vy, 14);

  // Resolve movement + collision
  resolvePlayer();

  // Camera follow (horizontal only)
  const targetCamX = player.x - W/2 + player.w/2;
  cam.x = clamp(targetCamX, 0, levelDef.levelW - W);

  // Fell off screen
  if (player.y > H + 60) {
    triggerDeath();
    return;
  }

  // Player animation
  if (player.onGround && player.vx !== 0) {
    player.frameTimer++;
    if (player.frameTimer > 10) { player.frameTimer = 0; player.frame++; }
  } else {
    player.frame = 1;
    player.frameTimer = 0;
  }

  // Invincibility countdown
  if (player.invTimer > 0) player.invTimer--;

  // Speed boost countdown
  if (speedBoostTimer > 0) speedBoostTimer--;

  // ── Update cats ──
  for (const cat of cats) {
    cat.x += cat.speed * cat.dir;
    if (cat.x <= cat.px)             { cat.x = cat.px;           cat.dir = 1; }
    if (cat.x >= cat.px + cat.pw - 32) { cat.x = cat.px + cat.pw - 32; cat.dir = -1; }

    cat.frameTimer = (cat.frameTimer || 0) + 1;
    if (cat.frameTimer > 12) { cat.frameTimer = 0; cat.frame++; }

    // Cat vs player collision
    if (player.invTimer <= 0) {
      const cr = rect(cat.x, cat.y, 7*PX, 8*PX);
      if (overlaps(playerRect(), cr)) {
        triggerDeath();
        return;
      }
    }
  }

  // ── Collect laundry ──
  for (const lau of laundry) {
    if (lau.picked) continue;
    const lr = rect(lau.x, lau.y, LAUNDRY_W, LAUNDRY_H);
    if (overlaps(playerRect(), lr)) {
      lau.picked = true;
      collectedCount++;
      score += 10;
      sndCollect();
      spawnParticles(lau.x + 10, lau.y + 10, lau.color, 8);
    }
  }

  // ── Collect bones ──
  for (const bone of bones) {
    if (bone.picked) continue;
    const br = rect(bone.x, bone.y, BONE_W, BONE_H);
    if (overlaps(playerRect(), br)) {
      bone.picked = true;
      sndBone();
      spawnParticles(bone.x + 12, bone.y + 11, bone.kind === 'life' ? '#ff88aa' : '#88ccff', 10);
      if (bone.kind === 'life') {
        lives = Math.min(lives + 1, 9);
      } else {
        speedBoostTimer = 300; // ~5 seconds at 60fps
      }
    }
  }

  // ── Reach washer ──
  const wr = rect(washer.x, washer.y, WASHER_W, WASHER_H);
  if (overlaps(playerRect(), wr)) {
    score += collectedCount * 5; // bonus for laundry collected
    screen = 'levelwin';
    levelWinTimer = 0;
    sndWin();
    spawnParticles(washer.x + WASHER_W/2, washer.y, '#44ffaa', 20);
  }

  updateParticles();
}

function triggerDeath() {
  if (player.invTimer > 0) return; // already in grace period, skip
  lives--;
  sndHurt();
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 12);

  if (lives <= 0) {
    screen = 'gameover';
    sndGameOver();
  } else {
    // Respawn at level start — keep collected laundry and score
    player.x = levelDef.start.x;
    player.y = levelDef.start.y;
    player.vx = 0;
    player.vy = 0;
    player.invTimer = 120; // 2 seconds of invincibility
    cam.x = 0;
  }
}

// ── Main draw ────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (screen === 'title') {
    drawTitleScreen();
    return;
  }

  if (screen === 'gameover') {
    drawOverlay('GAME OVER', [`Final Score: ${score}`, 'Press SPACE or ENTER to retry'], '[ SPACE / ENTER ]');
    return;
  }

  if (screen === 'win') {
    drawOverlay('YOU WIN! 🎉', [`Total Score: ${score}`, 'All levels complete!', 'Pip is the best laundry dog!'], '[ SPACE / ENTER ]');
    return;
  }

  // Draw gameplay
  drawBackground(levelDef);
  drawPlatforms();

  // Washer
  drawWasher(washer.x, washer.y);

  // Laundry items
  for (const lau of laundry) {
    if (!lau.picked) drawLaundry(lau.x, lau.y, lau.color);
  }

  // Bones
  for (const bone of bones) {
    if (!bone.picked) drawBone(bone.x, bone.y, bone.kind);
  }

  // Cats
  for (const cat of cats) {
    const sx = camX(cat.x);
    if (sx > -80 && sx < W + 80) {
      drawCat(cat.x, cat.y, cat.dir > 0, cat.frame);
    }
  }

  // Pip
  drawPip(player.x, player.y, player.facingRight, player.frame, player.invTimer);

  // Particles
  drawParticles();

  // HUD
  drawHUD();

  // Level win overlay
  if (screen === 'levelwin') {
    const pts = collectedCount * 5;
    drawOverlay('LEVEL CLEAR! 🎉', [
      `Laundry collected: ${collectedCount} / ${laundry.length}`,
      `Bonus points: +${pts}`,
      `Score: ${score}`,
    ], levelIndex < LEVEL_DEFS.length - 1 ? '[ SPACE ] Next Level' : '[ SPACE ] Finish!');
  }
}

// ── Title screen ─────────────────────────────────────────────
function drawTitleScreen() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a2e'); grad.addColorStop(1,'#2a0a20');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // Stars
  const t = Date.now() * 0.001;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 50; i++) {
    const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 93.7)  * 0.5 + 0.5) * H * 0.8;
    const blink = (Math.sin(t * 2 + i) * 0.5 + 0.5);
    ctx.globalAlpha = blink;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 20;
  ctx.fillText('LAUNDRY DOG', W/2, 130);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#ff6b9d';
  ctx.fillText('A Pip Adventure', W/2, 175);

  // Draw a demo pip on title
  cam.x = 0;
  drawPip(W/2 - 20, 250, true, Math.floor(t * 4), 0);
  // Demo washer
  ctx.save();
  ctx.translate(-140, 0);
  drawWasher(W/2 + 80, 240);
  ctx.restore();

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ccc';
  ctx.fillText('Collect all the laundry and reach the washing machine!', W/2, 360);
  ctx.fillText('Avoid the cats • Grab bones for power-ups', W/2, 386);
  ctx.fillText('Arrow Keys to move • Up / Space to jump', W/2, 412);

  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = Math.floor(t * 2) % 2 === 0 ? '#ffd700' : '#ff6b9d';
  ctx.fillText('Press SPACE or ENTER to start!', W/2, 455);

  ctx.textAlign = 'left';
}

// Screen transition via Space/Enter is handled in the main keydown listener above
// (merged below — removing the duplicate listener)

// ── Game loop ────────────────────────────────────────────────
let lastTime = 0;
function loop(now) {
  // Cap delta so large pauses don't cause tunneling
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
screen = 'title';
lives  = 3;
score  = 0;
levelIndex = 0;
cam.x  = 0;
// Dummy levelDef so HUD doesn't crash before first level loads
levelDef = { name: 'Laundry Dog', bg:['#1a0a2e','#2a0a20'], levelW: W, platforms:[], laundry:[], cats:[], washer:{x:0,y:0}, start:{x:0,y:0} };
laundry = []; bones = []; cats = []; platforms = [];

requestAnimationFrame(loop);
</script>
</body>
