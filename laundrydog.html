<title>Laundry Dog</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: monospace;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Back button ── */
#back-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 999;
  background: rgba(0,0,0,0.75);
  color: #ff6b9d;
  border: 2px solid #ff6b9d;
  border-radius: 6px;
  padding: 7px 14px;
  font-family: monospace;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#back-btn:hover, #back-btn:active { background: rgba(255,107,157,0.3); }

canvas {
  display: block;
  border: 3px solid #ff6b9d;
  box-shadow: 0 0 20px #ff6b9d88;
  image-rendering: pixelated;
  max-width: 100vw;
  width: min(800px, 100vw);
  height: auto;
  aspect-ratio: 800 / 480;
}

/* ── Mobile d-pad ── */
#mobile-controls {
  display: none;
  position: relative;
  width: min(800px, 100vw);
  height: 110px;
  margin-top: 6px;
  flex-shrink: 0;
}

#dpad {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 6px;
  align-items: center;
}

.ctrl-btn {
  width: 62px;
  height: 62px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  color: #fff;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn.active {
  background: rgba(255,107,157,0.45);
  border-color: #ff6b9d;
}

#btn-jump {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 80px;
  height: 80px;
  background: rgba(255,107,157,0.2);
  border: 3px solid #ff6b9d;
  border-radius: 50%;
  color: #ff6b9d;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
#btn-jump.active { background: rgba(255,107,157,0.5); }

/* ── HTML action button (Start / Next / Retry) ── */
#action-btn {
  display: none;
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  padding: 14px 40px;
  background: #ff6b9d;
  color: #fff;
  font-family: monospace;
  font-size: 20px;
  font-weight: bold;

}
#action-btn:active {

  box-shadow: 0 1px 0 #a00040;
}

// ── Virtual keys (mobile) ────────────────────────────────────
const VKEY = { left: false, right: false, up: false };

function wireCtrlBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = e => { e.preventDefault(); VKEY[key] = true;  el.classList.add('active'); };
  const off = e => { e.preventDefault(); VKEY[key] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart',  on,  { passive: false });
  el.addEventListener('touchend',    off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
wireCtrlBtn('btn-left',  'left');
wireCtrlBtn('btn-right', 'right');
wireCtrlBtn('btn-up',    'up');

});

function positionActionBtn() {
  const r = canvas.getBoundingClientRect();
  actionBtn.style.top = (r.top + r.height * 0.74 + window.scrollY) + 'px';
}

function showActionBtn(label, cb) {
  _actionCb = cb;
  actionBtn.textContent = label;
  positionActionBtn();
  actionBtn.style.display = 'block';
}

function hideActionBtn() {
  actionBtn.style.display = 'none';

window.addEventListener('resize', () => {

// ── Audio ────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol, when) {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    const t = a.currentTime + (when || 0);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function sndJump()    { beep(300,'square',0.12,0.15); beep(450,'square',0.08,0.12,0.06); }
function sndCollect() { beep(523,'square',0.07,0.15); beep(659,'square',0.07,0.12,0.07); beep(784,'square',0.1,0.12,0.14); }
function sndHurt()    { beep(200,'sawtooth',0.08,0.2); beep(150,'sawtooth',0.12,0.18,0.07); }
function sndBone()    { beep(440,'triangle',0.06,0.2); beep(554,'triangle',0.06,0.18,0.07); beep(659,'triangle',0.08,0.18,0.14); beep(880,'triangle',0.1,0.2,0.22); }

// ── Sprites ─────────────────────────────────────────────────
const PX = 4;

function drawPip(x, y, facingRight, frame, inv) {
  if (inv > 0 && Math.floor(Date.now() / 80) % 2 === 0) return;
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const flip = !facingRight;
  const bob = (frame % 2) * 1;

  ctx.save();
  ctx.translate(sx, sy + bob);

  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(PX, PX*4, PX*6, PX*5);
  ctx.fillRect(PX, PX*1, PX*6, PX*4);
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(flip ? PX*4 : PX*2, PX*5, PX*2, PX*2);
  ctx.fillRect(flip ? PX*1 : PX*5, PX*2, PX*2, PX*2);
  ctx.fillStyle = '#c8c8c8';
  ctx.fillRect(PX, PX*8, PX*6, PX*1);
  ctx.fillStyle = '#111';
  ctx.fillRect(flip ? PX*2 : PX*5, PX*2, PX*1, PX*1);
  ctx.fillStyle = '#ff88aa';
  ctx.fillRect(flip ? PX*1 : PX*6, PX*4, PX*1, PX*1);
  ctx.fillStyle = '#d4a870';
  ctx.fillRect(flip ? PX*5 : PX*1, PX*0, PX*2, PX*2);
  ctx.fillRect(flip ? PX*2 : PX*5, PX*0, PX*1, PX*1);
  ctx.fillStyle = '#e8e8e8';
  const tailX = flip ? PX*7 : 0;
  const tailWag = Math.sin(Date.now() / 200) * 2;
  ctx.fillRect(tailX, PX*4 + tailWag, PX*1, PX*4);
  ctx.fillStyle = '#e0e0e0';
  const legOff = (frame % 2) === 0 ? 0 : PX;
  ctx.fillRect(PX*2, PX*9 - legOff, PX*2, PX*2);
  ctx.fillRect(PX*5, PX*9 + legOff, PX*2, PX*2);

  ctx.restore();
}

function drawCat(x, y, facingRight, frame) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const flip = !facingRight;
  const bob = (frame % 2) * 1;

  ctx.save();
  ctx.translate(sx, sy + bob);

  ctx.fillStyle = '#d4612a';
  ctx.fillRect(PX*1, PX*3, PX*5, PX*4);
  ctx.fillRect(PX*1, PX*1, PX*5, PX*3);
  ctx.fillStyle = '#a03010';
  ctx.fillRect(PX*2, PX*4, PX*1, PX*3);
  ctx.fillRect(PX*4, PX*4, PX*1, PX*3);
  ctx.fillStyle = '#d4612a';
  ctx.fillRect(flip ? PX*4 : PX*1, 0, PX*1, PX*2);
  ctx.fillRect(flip ? PX*2 : PX*4, 0, PX*1, PX*1);
  ctx.fillStyle = '#00dd44';
  ctx.fillRect(flip ? PX*2 : PX*4, PX*2, PX*1, PX*1);
  ctx.fillStyle = '#c05020';
  const tailSway = Math.sin(Date.now() / 300 + x * 0.01) * 3;
  ctx.fillRect(flip ? PX*6 : 0, PX*5 + tailSway, PX*1, PX*3);
  ctx.fillStyle = '#b04010';
  const lf = frame % 2;
  ctx.fillRect(PX*1, PX*7 - lf*PX, PX*2, PX*2);
  ctx.fillRect(PX*4, PX*7 + lf*PX, PX*2, PX*2);

  ctx.restore();
}

function drawWasher(x, y) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const pw = 14, ph = 16;

  ctx.fillStyle = '#dde';
  ctx.fillRect(sx, sy, pw*PX, ph*PX);
  ctx.fillStyle = '#bbc';
  ctx.fillRect(sx, sy, pw*PX, PX*2);
  ctx.fillStyle = '#5af';
  ctx.beginPath();
  ctx.arc(sx + pw*PX/2, sy + ph*PX*0.6, PX*4, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#88a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(sx + pw*PX/2, sy + ph*PX*0.6, PX*4, 0, Math.PI*2);
  ctx.stroke();
  const ang = Date.now() / 400;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx + pw*PX/2 + Math.cos(ang)*PX*2.5, sy + ph*PX*0.6 + Math.sin(ang)*PX*2.5);
  ctx.lineTo(sx + pw*PX/2 - Math.cos(ang)*PX*2.5, sy + ph*PX*0.6 - Math.sin(ang)*PX*2.5);
  ctx.stroke();
  ctx.fillStyle = '#88a';
  ctx.fillRect(sx + PX, sy + PX/2, PX*2, PX);
  ctx.fillRect(sx + PX*4, sy + PX/2, PX*2, PX);
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = '#44ffaa';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx-2, sy-2, pw*PX+4, ph*PX+4);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', sx + pw*PX/2, sy + ph*PX + 14);
  ctx.textAlign = 'left';
}
const WASHER_W = 14*PX, WASHER_H = 16*PX;

function drawLaundry(x, y, color) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const bob = Math.sin(Date.now() / 500 + x * 0.05) * 3;
  ctx.fillStyle = color;
  ctx.fillRect(sx,      sy + bob + 6,  20, 14);
  ctx.fillRect(sx + 3,  sy + bob,       14, 8);
  ctx.fillRect(sx - 4,  sy + bob + 2,   8,  8);
  ctx.fillRect(sx + 16, sy + bob + 2,   8,  8);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(sx + 4, sy + bob + 2, 4, 2);
}
const LAUNDRY_W = 20, LAUNDRY_H = 20;

function drawBone(x, y, kind) {
  const sx = Math.round(camX(x));
  const sy = Math.round(y);
  const bob = Math.sin(Date.now() / 400 + x * 0.05) * 3;
  const col = kind === 'life' ? '#ff88aa' : '#88ccff';
  ctx.fillStyle = col;
  ctx.fillRect(sx + 4, sy + bob + 8, 16, 6);
  ctx.beginPath(); ctx.arc(sx + 5,  sy + bob + 11, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx + 19, sy + bob + 11, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = kind === 'life' ? '#ff3366' : '#3399ff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(kind === 'life' ? '+♥' : '⚡', sx + 12, sy + bob + 2);
  ctx.textAlign = 'left';
}
const BONE_W = 24, BONE_H = 22;

// ── Player ───────────────────────────────────────────────────
const GRAV  = 0.5;
const JUMP  = -11;
const SPD   = 3.5;

const player = {
  x: 40, y: 200,
  vx: 0, vy: 0,
  w: 8 * PX,
  h: 10 * PX,
  onGround: false,
  facingRight: true,
  frame: 0,
  frameTimer: 0,
  invTimer: 0,
  jumpHeld: false,
  lastSafeX: 40,  // last X where player was standing on solid ground
  lastSafeY: 200, // last Y where player was standing on solid ground
};

function playerRect() { return { x:player.x, y:player.y, w:player.w, h:player.h }; }

// ── Level runtime state ──────────────────────────────────────
let cats      = [];
let laundry   = [];
let bones     = [];
let platforms = [];
let washer    = { x:0, y:0 };
let levelDef  = null;
let collectedCount  = 0;
let speedBoostTimer = 0;

const LAUNDRY_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

function initLevel(def) {
  levelDef  = def;
  platforms = def.platforms;
  washer    = def.washer;

  cats = def.cats.map(c => ({
    x: c.x, y: c.y,
    px: c.px, pw: c.pw,
    speed: c.speed,
    dir: c.dir,
    frame: 0, frameTimer: 0,
  }));

  laundry = def.laundry.map(l => ({
    x: l.x, y: l.y,
    color: LAUNDRY_COLORS[Math.floor(Math.random() * LAUNDRY_COLORS.length)],
    picked: false,
  }));

  bones = def.bones.map(b => ({ x:b.x, y:b.y, kind:b.kind, picked: false }));

  player.x = def.start.x;
  player.y = def.start.y;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.facingRight = true;
  player.frame = 0;
  player.invTimer = 90;
  player.jumpHeld = false;
  player.lastSafeX = def.start.x;
  player.lastSafeY = def.start.y;

  collectedCount  = 0;
  speedBoostTimer = 0;
  cam.x = 0;
  particles = [];
}

// ── Physics ──────────────────────────────────────────────────
function resolvePlayer() {
  player.x += player.vx;
  player.x = clamp(player.x, 0, levelDef.levelW - player.w);

  for (const p of platforms) {
    const pr = rect(player.x, player.y + 4, player.w, player.h - 4);
    const pp = rect(p.x, p.y, p.w, p.h);
    if (overlaps(pr, pp)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  player.y += player.vy;
  player.onGround = false;
  for (const p of platforms) {
    const pr = rect(player.x + 2, player.y, player.w - 4, player.h);
    const pp = rect(p.x, p.y, p.w, p.h);
    if (overlaps(pr, pp)) {
      if (player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }
}

// ── Particles ────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: rnd(-3,3), vy: rnd(-5,-1), life: 1, color });
  }
}
function updateParticles() {
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03; }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(camX(p.x) - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
}

// ── HUD ─────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 36);

  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('❤', 10, 22);
  ctx.fillStyle = '#fff';
  ctx.fillText('x ' + lives, 28, 22);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(levelDef ? levelDef.name : '', W/2, 22);
  ctx.textAlign = 'left';

  ctx.fillStyle = '#aef';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`🧺 ${collectedCount} / ${laundry.length}`, W - 130, 22);

  ctx.fillStyle = '#ffd700';
  ctx.font = '12px monospace';
  ctx.fillText(`Score: ${score}`, W - 130, 50);

  if (speedBoostTimer > 0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('⚡ SPEED!', 10, 50);
  }
}

// ── Background ───────────────────────────────────────────────
function drawBackground(def) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, def.bg[0]);
  grad.addColorStop(1, def.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x < W; x += 40)
    for (let y = 36; y < H; y += 40)
      ctx.fillRect(x + 2, y + 2, 4, 4);
}

// ── Platforms ────────────────────────────────────────────────
function drawPlatforms() {
  for (const p of platforms) {
    const sx = camX(p.x);
    if (sx + p.w < 0 || sx > W) continue;
    ctx.fillStyle = p.color;
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(sx, p.y, p.w, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(sx, p.y + p.h - 3, p.w, 3);
  }
}

// ── Overlay ──────────────────────────────────────────────────
function drawOverlay(title, lines) {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 48px monospace';
  ctx.shadowColor = '#ffa500'; ctx.shadowBlur = 16;
  ctx.fillText(title, W/2, H/2 - 80);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ddd';
  ctx.font = '18px monospace';
  lines.forEach((l, i) => ctx.fillText(l, W/2, H/2 - 20 + i*30));
  ctx.textAlign = 'left';
}

// ── Death (IN-PLACE RESPAWN) ─────────────────────────────────
function triggerDeath() {
  if (player.invTimer > 0) return;
  lives--;
  sndHurt();
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 12);

  if (lives <= 0) {
    screen = 'gameover';
    sndGameOver();
    showActionBtn('🔄 Try Again', () => {
      lives = 3; score = 0; levelIndex = 0;
      initLevel(LEVEL_DEFS[0]);
      screen = 'playing';
    });
  } else {
    // Stay in place — just bounce up and go invincible
    player.vy = -7;
    player.vx = 0;
    player.invTimer = 150; // ~2.5 sec at 60fps
    // player.x and player.y are intentionally NOT reset
  }
}

// ── Update ───────────────────────────────────────────────────
function update() {
  if (screen !== 'playing') return;

  const spd = (speedBoostTimer > 0) ? SPD * 1.7 : SPD;

  if (keyLeft()) {
    player.vx = -spd;
    player.facingRight = false;
  } else if (keyRight()) {
    player.vx = spd;
    player.facingRight = true;
  } else {
    player.vx = 0;
  }

  const jumpKey = keyJump();
  if (jumpKey && player.onGround && !player.jumpHeld) {
    player.vy = JUMP;
    player.jumpHeld = true;
    player.onGround = false;
    sndJump();
  }
  if (!jumpKey) player.jumpHeld = false;

  player.vy += GRAV;
  player.vy = Math.min(player.vy, 14);

  resolvePlayer();

  const targetCamX = player.x - W/2 + player.w/2;
  cam.x = clamp(targetCamX, 0, levelDef.levelW - W);

  // Fell off screen → respawn at last safe ground position
  if (player.y > H + 80) {
    player.x = player.lastSafeX;
    player.y = player.lastSafeY;
    player.vx = 0;
    player.vy = 0;
    triggerDeath();
    return;
  }

  if (player.onGround && player.vx !== 0) {
    player.frameTimer++;
    if (player.frameTimer > 10) { player.frameTimer = 0; player.frame++; }
  } else {
    player.frame = 1;
    player.frameTimer = 0;
  }

  if (player.invTimer > 0) player.invTimer--;
  if (speedBoostTimer > 0) speedBoostTimer--;

  // Record last safe ground position for fall respawning
  if (player.onGround) {
    player.lastSafeX = player.x;
    player.lastSafeY = player.y;
  }

  // Cats
  for (const cat of cats) {
    cat.x += cat.speed * cat.dir;
    if (cat.x <= cat.px)               { cat.x = cat.px;               cat.dir = 1; }
    if (cat.x >= cat.px + cat.pw - 32) { cat.x = cat.px + cat.pw - 32; cat.dir = -1; }
    cat.frameTimer = (cat.frameTimer || 0) + 1;
    if (cat.frameTimer > 12) { cat.frameTimer = 0; cat.frame++; }

    if (player.invTimer <= 0) {
      const cr = rect(cat.x, cat.y, 7*PX, 8*PX);
      if (overlaps(playerRect(), cr)) { triggerDeath(); return; }
    }
  }

  // Laundry
  for (const lau of laundry) {
    if (lau.picked) continue;
    if (overlaps(playerRect(), rect(lau.x, lau.y, LAUNDRY_W, LAUNDRY_H))) {
      lau.picked = true;
      collectedCount++;
      score += 10;
      sndCollect();
      spawnParticles(lau.x + 10, lau.y + 10, lau.color, 8);
    }
  }

  // Bones
  for (const bone of bones) {
    if (bone.picked) continue;
    if (overlaps(playerRect(), rect(bone.x, bone.y, BONE_W, BONE_H))) {
      bone.picked = true;
      sndBone();
      spawnParticles(bone.x + 12, bone.y + 11, bone.kind === 'life' ? '#ff88aa' : '#88ccff', 10);
      if (bone.kind === 'life') lives = Math.min(lives + 1, 9);
      else speedBoostTimer = 300;
    }
  }

  // Washer
  if (overlaps(playerRect(), rect(washer.x, washer.y, WASHER_W, WASHER_H))) {
    score += collectedCount * 5;
    screen = 'levelwin';
    levelWinTimer = 0;
    sndWin();
    spawnParticles(washer.x + WASHER_W/2, washer.y, '#44ffaa', 20);
    const isLast = levelIndex >= LEVEL_DEFS.length - 1;
    showActionBtn(isLast ? '🏆 Finish!' : '▶ Next Level', () => {
      levelIndex++;
      if (levelIndex >= LEVEL_DEFS.length) {
        screen = 'win';
        showActionBtn('🔄 Play Again', () => { screen = 'title'; showTitleBtn(); });
      } else {
        initLevel(LEVEL_DEFS[levelIndex]);
        screen = 'playing';
      }
    });
  }

  updateParticles();
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (screen === 'title') {
    drawTitleScreen();
    return;
  }

  drawBackground(levelDef);
  drawPlatforms();
  drawWasher(washer.x, washer.y);
  for (const lau of laundry) if (!lau.picked) drawLaundry(lau.x, lau.y, lau.color);
  for (const bone of bones)  if (!bone.picked) drawBone(bone.x, bone.y, bone.kind);
  for (const cat of cats) {
    const sx = camX(cat.x);
    if (sx > -80 && sx < W + 80) drawCat(cat.x, cat.y, cat.dir > 0, cat.frame);
  }
  drawPip(player.x, player.y, player.facingRight, player.frame, player.invTimer);
  drawParticles();
  drawHUD();

  if (screen === 'levelwin') {
    const pts = collectedCount * 5;
    drawOverlay('LEVEL CLEAR! 🎉', [
      `Laundry: ${collectedCount} / ${laundry.length}`,
      `Bonus: +${pts}  •  Score: ${score}`,
    ]);
  }
  if (screen === 'gameover') {
    drawOverlay('GAME OVER', [`Final Score: ${score}`]);
  }
  if (screen === 'win') {
    drawOverlay('YOU WIN! 🎉', [
      `Total Score: ${score}`,
      'All levels complete!',
      'Pip is the best laundry dog!',
    ]);
  }
}

// ── Title screen ─────────────────────────────────────────────
function drawTitleScreen() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a2e'); grad.addColorStop(1,'#2a0a20');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  const t = Date.now() * 0.001;
  for (let i = 0; i < 50; i++) {
    const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 93.7)  * 0.5 + 0.5) * H * 0.8;
    ctx.globalAlpha = Math.sin(t * 2 + i) * 0.5 + 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 20;
  ctx.fillText('LAUNDRY DOG', W/2, 130);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#ff6b9d';
  ctx.fillText('A Pip Adventure', W/2, 175);

  cam.x = 0;
  drawPip(W/2 - 20, 250, true, Math.floor(t * 4), 0);
  ctx.save();
  ctx.translate(-140, 0);
  drawWasher(W/2 + 80, 240);
  ctx.restore();

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ccc';
  ctx.fillText('Collect laundry and reach the washing machine!', W/2, 358);
  ctx.fillText('Avoid cats  •  Grab bones for power-ups', W/2, 384);
  ctx.fillText('Arrow keys / D-pad to move  •  Up or ↑ to jump', W/2, 410);

  ctx.textAlign = 'left';
}

function showTitleBtn() {
  showActionBtn('▶ START GAME', () => {
    lives = 3; score = 0; levelIndex = 0;
    initLevel(LEVEL_DEFS[0]);
    screen = 'playing';
  });
}

// ── Game loop ────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Boot ─────────────────────────────────────────────────────
screen        = 'title';
lives         = 3;
score         = 0;
levelIndex    = 0;
levelWinTimer = 0;
cam.x         = 0;
levelDef      = { name: '', bg:['#1a0a2e','#2a0a20'], levelW: W, platforms:[], cats:[], washer:{x:0,y:0}, start:{x:0,y:0} };
laundry = []; bones = []; cats = []; platforms = [];

showTitleBtn();
requestAnimationFrame(loop);
</script>
</body>
</html>
